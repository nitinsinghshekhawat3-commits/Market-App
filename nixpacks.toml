[build]
# Use Node 22 LTS to satisfy all package requirements (>=22.12.0)
nodeVersion = "22"

[variables]
NODE_ENV = "production"
NPM_CONFIG_LOGLEVEL = "warn"

[phases.setup]
cmds = ["npm cache clean --force", "npm install"]

[phases.build]
cmds = ["npm ci --only=production"]

[phases.start]
cmd = "node server.cjs"
